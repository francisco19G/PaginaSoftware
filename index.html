<main class="main-content">

</main>
    <div id="authInterface" class="auth-interface">
        <div class="auth-container single-column">
            <div id="closeAuth" class="close-auth">&#10006;</div>

            <div class="auth-column" id="registerView">
                <h2 class="auth-title">Crear Cuenta</h2>
                <div class="form-group">
                    <label class="form-label">Nombre de Usuario</label>
                    <input type="text" id="regNombre" class="form-input" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="regCorreo" class="form-input" placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="regPass" class="form-input" placeholder="Mínimo 8 caracteres">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" class="checkbox-input" id="acceptTerms">
                    <label for="acceptTerms" class="checkbox-label">Acepto los términos y condiciones</label>
                </div>
                <button class="auth-button" id="btnRegistrarFinal">Registrarse</button>
                <div class="already-account">
                    ¿Ya tienes una cuenta? <button id="toggleLogin" class="text-button">Iniciar Sesión</button>
                </div>
            </div>

            <div class="auth-column" id="loginView" style="display: none;">
                <h2 class="auth-title">Iniciar Sesión</h2>
                <div class="form-group">
                    <label class="form-label">Correo o Usuario</label>
                    <input type="text" id="loginUser" class="form-input" placeholder="Usuario/Email">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="loginPass" class="form-input" placeholder="Tu contraseña">
                </div>
                <button class="auth-button" id="btnEntrarLogin">Entrar</button>
                <div class="already-account">
                    ¿No tienes cuenta? <button id="toggleRegister" class="text-button">Registrarse</button>
                </div>
            </div>
        </div>
    </div>

    <footer style="background: #2F2A26; color: white; padding: 20px 0; text-align: center; width: 100%;">
        <div class="container">
            <p>&copy; 2026 BAJAR - Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const authInterface = document.getElementById('authInterface');
        const registerView = document.getElementById('registerView');
        const loginView = document.getElementById('loginView');
        const userBtn = document.getElementById('userBtn'); 
        const closeAuth = document.getElementById('closeAuth');
        const btnIrALogin = document.getElementById('toggleLogin');
        const btnIrARegistro = document.getElementById('toggleRegister');
        const btnRegistrar = document.getElementById('btnRegistrarFinal');
        const btnEntrar = document.getElementById('btnEntrarLogin');

        // Navegación básica
        userBtn.onclick = () => authInterface.classList.add('is-visible');
        closeAuth.onclick = () => authInterface.classList.remove('is-visible');
        btnIrALogin.onclick = () => { registerView.style.display = 'none'; loginView.style.display = 'flex'; };
        btnIrARegistro.onclick = () => { loginView.style.display = 'none'; registerView.style.display = 'flex'; };

        window.onclick = (e) => { if (e.target == authInterface) closeAuth.onclick(); };

        // REGISTRO
        btnRegistrar.onclick = async () => {
            const nombre = document.getElementById('regNombre').value.trim();
            const correo = document.getElementById('regCorreo').value.trim();
            const password = document.getElementById('regPass').value;

            if (!nombre || !correo || !password) return alert("Llena todos los campos.");

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, correo, password })
                });
                const datos = await res.json();

                if (res.ok || datos.success) {
                    alert(datos.message);
                    // Cambiar automáticamente a la vista de Login
                    registerView.style.display = 'none';
                    loginView.style.display = 'flex';
                } else {
                    alert("Error: " + datos.error);
                }
            } catch (err) { alert("Error de conexión."); }
        };

        // LOGIN
        btnEntrar.onclick = async () => {
            const correo = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });
                const datos = await res.json();

                if (res.ok) {
                    alert(`¡Bienvenido, ${datos.user.nombre}!`);
                    authInterface.classList.remove('is-visible');
                    userBtn.innerHTML = `<span style="font-size: 14px; font-weight: bold;">Hola, ${datos.user.nombre}</span>`;
                } else {
                    alert("Error: " + datos.error);
                }
            } catch (err) { alert("Error al iniciar sesión."); }
        };
    </script>
</body>
</html>
